<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; media-src 'self' mediastream:; img-src 'self' data:;">
  <title>macOS Screen Recorder</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <h1>Screen Recorder</h1>

    <section id="recent-section" style="display: none;">
      <h2>Recent Recordings</h2>
      <div id="recent-list"></div>
    </section>

    <section id="displays">
      <h2>Select Displays</h2>
      <div id="display-list">
        <p class="loading">Loading displays...</p>
      </div>
    </section>

    <section id="audio-settings">
      <h2>Audio</h2>
      <label>
        <input type="checkbox" id="capture-system-audio" checked>
        System Audio
      </label>
      <label>
        <input type="checkbox" id="capture-microphone" checked>
        Microphone
      </label>
      <div class="gain-control">
        <label for="mic-gain">Mic Volume</label>
        <input type="range" id="mic-gain" min="0" max="100" value="80">
      </div>
      <div id="audio-meters" style="display: none;">
        <div class="audio-meter">
          <span class="meter-label">System</span>
          <div class="meter-bar"><div class="meter-fill" id="system-meter"></div></div>
        </div>
        <div class="audio-meter">
          <span class="meter-label">Mic</span>
          <div class="meter-bar"><div class="meter-fill" id="mic-meter"></div></div>
        </div>
      </div>
    </section>

    <section id="quality-section">
      <h2>Quality</h2>
      <div class="quality-options">
        <label>
          <input type="radio" name="quality" value="low">
          <span>Low <small>1.5 Mbps · 24 FPS</small></span>
        </label>
        <label>
          <input type="radio" name="quality" value="medium" checked>
          <span>Medium <small>2.5 Mbps · 30 FPS</small></span>
        </label>
        <label>
          <input type="radio" name="quality" value="high">
          <span>High <small>5 Mbps · 60 FPS</small></span>
        </label>
      </div>
    </section>

    <section id="output-section">
      <h2>Output</h2>
      <div class="output-row">
        <span id="output-path" class="output-path">~/Documents</span>
        <button id="output-btn" class="output-browse">
          <svg width="13" height="11" viewBox="0 0 13 11" aria-hidden="true" fill="currentColor"><path d="M0 2a1 1 0 011-1h3.59l1.7 1.7a1 1 0 00.71.3H12a1 1 0 011 1V10a1 1 0 01-1 1H1a1 1 0 01-1-1V2z"/></svg>
          Browse
        </button>
      </div>
    </section>

    <section id="controls">
      <button id="start-btn">
        <svg width="10" height="10" viewBox="0 0 10 10" aria-hidden="true" fill="currentColor"><circle cx="5" cy="5" r="4.5"/></svg>
        Start Recording
      </button>
      <button id="pause-btn" disabled>
        <svg width="10" height="10" viewBox="0 0 10 10" aria-hidden="true" fill="currentColor"><rect x="1.5" y="0.5" width="2.5" height="9" rx="0.8"/><rect x="6" y="0.5" width="2.5" height="9" rx="0.8"/></svg>
        Pause
      </button>
      <button id="stop-btn" disabled>
        <svg width="10" height="10" viewBox="0 0 10 10" aria-hidden="true" fill="currentColor"><rect x="0.5" y="0.5" width="9" height="9" rx="1.5"/></svg>
        Stop
      </button>
    </section>

    <section id="status">
      <p id="status-text">Ready</p>
      <div id="countdown" style="display: none;"></div>
      <p id="timer" style="display: none;">00:00:00</p>
    </section>

  </div>

  <script src="app.js"></script>
</body>
</html>
